{% if meta_pixel_id %}
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '{{ meta_pixel_id|e }}');
  fbq('track', 'PageView');

  document.addEventListener('DOMContentLoaded', function () {
    function parseMetaPixelParams(raw) {
      if (!raw) return {};
      try {
        var parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (err) {
        return {};
      }
    }

    function trackMetaPixelEvent(el) {
      var eventName = el.getAttribute('data-meta-pixel-event');
      if (!eventName || typeof fbq !== 'function') return;
      var params = parseMetaPixelParams(el.getAttribute('data-meta-pixel-params'));
      fbq('track', eventName, params);
    }

    document.querySelectorAll('[data-meta-pixel-event]').forEach(function (el) {
      if (el.tagName === 'FORM') {
        el.addEventListener('submit', function () {
          trackMetaPixelEvent(el);
        });
      } else {
        el.addEventListener('click', function () {
          trackMetaPixelEvent(el);
        });
      }
    });
  });
</script>
<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id={{ meta_pixel_id|urlencode }}&ev=PageView&noscript=1" alt="" /></noscript>
{% endif %}
