<style>
    :root {
        --bg-main: #f8fafc;
        --bg-card: #ffffff;
        --bg-input: #f1f5f9;
        --border-color: #e2e8f0;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --accent-blue: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.4);
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;

        --btn-primary-bg: #2563eb;
        --btn-primary-bg-hover: #1d4ed8;
        --btn-primary-text: #ffffff;
        --btn-primary-shadow: rgba(37, 99, 235, 0.35);

        --bg: var(--bg-main);
        --panel: var(--bg-card);
        --panel-2: var(--bg-input);
        --line: var(--border-color);
        --text: var(--text-main);
        --muted: var(--text-muted);
        --accent: var(--accent-blue);
        --green: var(--success);
        --green-text: #bbf7d0;
        --amber: var(--warning);
        --amber-text: #fde68a;
        --red: var(--danger);
        --red-text: #fecaca;
    }

    @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
        }
    }

    [data-theme="dark"] {
        --bg-main: #0f172a;
        --bg-card: #1e293b;
        --bg-input: #334155;
        --border-color: #334155;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent-blue: #38bdf8;
    }

    html {
        background: var(--bg-main);
    }

    body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
    }
</style>

<link
    rel="preload"
    href="{{ url_for('static', filename='style.css') }}"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
>

<noscript>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</noscript>
