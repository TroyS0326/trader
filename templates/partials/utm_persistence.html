<script>
(function () {
  const KEYS = ["utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term", "gclid", "fbclid"];
  const STORAGE_KEY = "xeanvi_attribution_params";
  const TARGET_PATHS = new Set(["/signup", "/pricing"]);

  function safeReadStored() {
    try {
      const raw = sessionStorage.getItem(STORAGE_KEY) || localStorage.getItem(STORAGE_KEY) || "{}";
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === "object" ? parsed : {};
    } catch (e) {
      return {};
    }
  }

  function safeWriteStored(value) {
    try {
      const serialized = JSON.stringify(value);
      sessionStorage.setItem(STORAGE_KEY, serialized);
      localStorage.setItem(STORAGE_KEY, serialized);
    } catch (e) {
      // ignore storage limitations
    }
  }

  function captureAttributionParams() {
    const current = {};
    const url = new URL(window.location.href);
    KEYS.forEach((key) => {
      const value = url.searchParams.get(key);
      if (value) current[key] = value;
    });

    const stored = safeReadStored();
    const merged = Object.assign({}, stored, current);
    safeWriteStored(merged);
    return merged;
  }

  function isSkippableHref(rawHref) {
    if (!rawHref || rawHref.startsWith("#")) return true;
    const lower = rawHref.toLowerCase();
    return lower.startsWith("mailto:") || lower.startsWith("tel:") || lower.includes("/logout");
  }

  function appendAttributionToEligibleLinks() {
    const storedParams = safeReadStored();
    if (!Object.keys(storedParams).length) return;

    document.querySelectorAll("a[href]").forEach((anchor) => {
      const rawHref = anchor.getAttribute("href") || "";
      if (isSkippableHref(rawHref)) return;

      const url = new URL(rawHref, window.location.origin);
      if (url.origin !== window.location.origin) return;
      if (!TARGET_PATHS.has(url.pathname)) return;

      KEYS.forEach((key) => {
        if (storedParams[key] && !url.searchParams.has(key)) {
          url.searchParams.set(key, storedParams[key]);
        }
      });

      anchor.setAttribute("href", url.pathname + url.search + url.hash);
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    captureAttributionParams();
    appendAttributionToEligibleLinks();
  });
})();
</script>
