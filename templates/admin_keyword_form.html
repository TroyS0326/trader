{% extends "base.html" %}
{% block title %}Keyword Plan | XeanVI{% endblock %}
{% block content %}
<main class="admin-shell" style="max-width:900px;">
  <header class="admin-header"><div><h1 class="admin-title">{{ 'Edit' if plan else 'New' }} Keyword Plan</h1></div></header>
  <section class="admin-card">
    <form method="POST" style="display:grid;gap:.8rem;">
      <input name="cluster" placeholder="Cluster" value="{{ plan.cluster if plan else '' }}">
      <input name="target_keyword" placeholder="Target keyword" required value="{{ plan.target_keyword if plan else '' }}">
      <input name="suggested_title" placeholder="Suggested title" required value="{{ plan.suggested_title if plan else '' }}">
      <input name="search_intent" placeholder="Search intent" value="{{ plan.search_intent if plan else 'educational' }}">
      <input name="priority" type="number" min="1" max="5" value="{{ plan.priority if plan else 3 }}">
      <input name="linked_page" placeholder="Linked product page" value="{{ plan.linked_page if plan else '' }}">
      <input name="planned_publish_date" type="date" value="{{ plan.planned_publish_date.strftime('%Y-%m-%d') if plan and plan.planned_publish_date else '' }}">
      <select name="status">{% for st in ['planned','drafted','published','skipped'] %}<option value="{{ st }}" {% if plan and plan.status==st %}selected{% endif %}>{{ st }}</option>{% endfor %}</select>
      <textarea name="notes" rows="4" placeholder="Notes">{{ plan.notes if plan else '' }}</textarea>
      <div style="display:flex;gap:.6rem;"><button class="btn-primary" type="submit">Save Plan</button><a class="btn-secondary" href="{{ url_for('admin_keyword_map') }}">Back</a></div>
    </form>
  </section>
</main>
{% endblock %}
