<!DOCTYPE html>
<html lang="en" data-theme="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ post.meta_title or post.title }}</title>
<meta name="description" content="{{ post.meta_description or post.excerpt or '' }}">
<link rel="canonical" href="{{ canonical_url }}">
<meta property="og:type" content="article"><meta property="og:title" content="{{ post.meta_title or post.title }}"><meta property="og:description" content="{{ post.meta_description or post.excerpt or '' }}"><meta property="og:url" content="{{ canonical_url }}">{% if og_image_absolute %}<meta property="og:image" content="{{ og_image_absolute }}">{% endif %}
<script type="application/ld+json">{"@context":"https://schema.org","@type":"BlogPosting","headline":{{ (post.meta_title or post.title)|tojson }},"description":{{ (post.meta_description or post.excerpt or '')|tojson }},"author":{"@type":"Person","name":{{ (post.author_name or 'XeanVI')|tojson }}}, "publisher":{"@type":"Organization","name":"XeanVI","url":{{ base_url|tojson }}}{% if og_image_absolute %},"image":[{{ og_image_absolute|tojson }}]{% endif %},"datePublished":{{ (post.published_at.isoformat() if post.published_at else '')|tojson }},"dateModified":{{ ((post.updated_at or post.published_at or post.created_at).isoformat() if (post.updated_at or post.published_at or post.created_at) else '')|tojson }},"url":{{ canonical_url|tojson }},"mainEntityOfPage":{{ canonical_url|tojson }}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":{{ (base_url ~ '/')|tojson }}},{"@type":"ListItem","position":2,"name":"Blog","item":{{ (base_url ~ '/blog')|tojson }}},{"@type":"ListItem","position":3,"name":{{ post.title|tojson }},"item":{{ canonical_url|tojson }} }]}</script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="auth-body">{% include 'nav.html' %}<main class="container" style="padding:3rem 1rem;max-width:900px;"><article>
<h1>{{ post.title }}</h1>{% if post.excerpt %}<p style="color:var(--text-muted);">{{ post.excerpt }}</p>{% endif %}
{% if post.og_image %}<figure class="blog-featured-image" style="margin:1.25rem 0 1rem;"><img src="{{ post.og_image }}" alt="{{ post.featured_image_alt or post.title }}" loading="lazy" style="width:100%;max-height:420px;object-fit:cover;border-radius:12px;">{% if post.featured_image_caption %}<figcaption style="color:#94a3b8;margin-top:.5rem;font-size:.92rem;">{{ post.featured_image_caption }}</figcaption>{% endif %}</figure>{% endif %}
<div class="blog-content">{{ post.body_html|safe }}</div></article></main>{% include 'footer.html' %}
<style>
.blog-content a { color:#38bdf8; font-weight:600; text-decoration:underline; text-underline-offset:3px; }
.blog-content a:hover, .blog-content a:visited:hover { color:#7dd3fc; }
.blog-content a:visited { color:#67e8f9; }
.blog-content a:focus { outline:2px solid #38bdf8; outline-offset:3px; border-radius:4px; }
</style></body></html>
