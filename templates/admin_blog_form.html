<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{% if post %}Edit{% else %}New{% endif %} Blog Post</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="auth-body">{% include 'nav.html' %}<main class="container" style="padding:2rem 1rem;max-width:900px;"><h1>{% if post %}Edit{% else %}New{% endif %} Blog Post</h1>
<form method="post"> <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input name="title" placeholder="Title" value="{{ post.title if post else '' }}" required><input name="slug" placeholder="Slug" value="{{ post.slug if post else '' }}"><input name="meta_title" placeholder="Meta title" value="{{ post.meta_title if post else '' }}"><input name="meta_description" placeholder="Meta description" value="{{ post.meta_description if post else '' }}"><input name="excerpt" placeholder="Excerpt" value="{{ post.excerpt if post else '' }}"><input name="target_keyword" placeholder="Target keyword" value="{{ post.target_keyword if post else '' }}"><input name="canonical_url" placeholder="Canonical URL" value="{{ post.canonical_url if post else '' }}"><input name="og_image" placeholder="OG image" value="{{ post.og_image if post else '' }}"><select name="status"><option value="draft" {% if post and post.status=='draft' %}selected{% endif %}>Draft</option><option value="published" {% if post and post.status=='published' %}selected{% endif %}>Published</option></select>
<textarea name="body_html" rows="16" required>{{ post.body_html if post else '' }}</textarea><button class="btn btn-primary" type="submit">Save</button></form>
{% if post %}<form method="post" action="{{ url_for('admin_blog_unpublish', post_id=post.id) }}" style="margin-top:1rem;"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn" type="submit">Unpublish</button></form>{% endif %}
</main>{% include 'footer.html' %}</body></html>
