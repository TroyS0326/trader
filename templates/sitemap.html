{% extends "base.html" %}

{% block content %}
<div class="container" style="padding: 4rem 2rem;">
    <h1 style="color: var(--text-main);">Site Map</h1>
    <div style="display: grid; gap: 1.5rem;">
        {% for link in links %}
            <a href="{{ link.url }}" style="color: var(--accent-blue);">{{ link.title }}</a>
        {% endfor %}
    </div>
</div>
{% endblock %}
