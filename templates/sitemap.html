{% extends "dashboard.html" if current_user.is_authenticated else "waitlist.html" %}

{% block content %}
<div class="container" style="padding: 4rem 2rem; min-height: 80vh; background: var(--bg-main);">
    <h1 style="color: var(--text-main); margin-bottom: 1rem;">Site Directory</h1>
    <p style="color: var(--text-muted); margin-bottom: 3rem;">Complete index of all public XeanVI modules.</p>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
        {% for link in links %}
            <div style="background: var(--bg-card); padding: 1.5rem; border: 1px solid var(--border-color); border-radius: 12px; transition: transform 0.2s;">
                <a href="{{ link.url }}" style="color: var(--accent-blue); text-decoration: none; font-weight: 600; font-size: 1.1rem;">
                    {{ link.title }}
                </a>
                <div style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">{{ link.url }}</div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
