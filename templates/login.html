<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Log In | XeanVI</title>
    <meta name="description" content="XeanVI is a disciplined, AI-driven algorithmic trading platform. Automate your morning stock scans, enforce strict risk management, and execute trades instantly via Alpaca.">
    <meta name="keywords" content="AI trading app, automated day-trading, algorithmic trading software, Alpaca API bot, retail investor tools, risk management software">
    <meta name="author" content="XeanVI">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xeanvi.com/login">
    <meta property="og:title" content="Log In | XeanVI">
    <meta property="og:description" content="Remove human emotion from your trading. Let AI scan the market, rank setups, and manage your risk. Start in zero-risk Paper Trading mode today.">
    <meta property="og:image" content="{{ url_for('static', filename='seo-banner.jpg', _external=True) }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:domain" content="xeanvi.com">
    <meta name="twitter:title" content="Log In | XeanVI">
    <meta name="twitter:description" content="Remove human emotion from your trading. Let AI scan the market, rank setups, and manage your risk.">
    <meta name="twitter:image" content="{{ url_for('static', filename='seo-banner.jpg', _external=True) }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="canonical" href="https://xeanvi.com/login">
</head>
<body class="auth-body">

    <!-- Brand logo -->
    <a href="/" class="logo" style="display: block; text-align: center; margin-bottom: 2rem;">Xean<span>VI</span></a>

    <div class="auth-box">
        <h2>Welcome Back</h2>
        <p>Log in to access your Command Center.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="auth-input" placeholder="you@example.com" required>
            </div>
            <div class="input-group" style="margin-bottom: 1rem;">
                <label>Password</label>
                <input type="password" name="password" class="auth-input" placeholder="••••••••" required>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-auth">Access Dashboard</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/signup">Sign Up Free</a>
        </div>
    </div>

</body>
</html>
