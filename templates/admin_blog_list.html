<!DOCTYPE html><html lang="en" data-theme="dark"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Blog</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body class="auth-body">{% include 'nav.html' %}<main class="container" style="padding:2rem 1rem;max-width:1000px;"><h1>Blog Admin</h1><p><a class="btn btn-primary" href="{{ url_for('admin_blog_new') }}">New Post</a></p>
<table style="width:100%"><tr><th>Title</th><th>Status</th><th>Updated</th><th>Published</th><th></th></tr>{% for post in posts %}<tr><td>{{ post.title }}</td><td>{{ post.status }}</td><td>{{ post.updated_at }}</td><td>{{ post.published_at or '' }}</td><td><a href="{{ url_for('admin_blog_edit', post_id=post.id) }}">Edit</a></td></tr>{% endfor %}</table></main>{% include 'footer.html' %}</body></html>
