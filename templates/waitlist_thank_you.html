<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>You’re on the XeanVI PRO Waitlist</title>
    <meta name="description" content="Thank you for joining the XeanVI PRO waitlist.">
    <meta name="robots" content="noindex, follow">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 60px 0;
        }

        .glass-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.35);
        }

        .display-title {
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -1.2px;
            color: #ffffff;
            line-height: 1.15;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .btn-custom {
            background-color: var(--accent);
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 14px 26px;
            border: none;
            transition: 0.2s ease;
        }

        .btn-custom:hover {
            background-color: #2563eb;
            color: #ffffff;
        }

        .secondary-link {
            color: #bfdbfe;
            text-decoration: none;
            font-weight: 500;
        }

        .secondary-link:hover {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .page-wrap {
                padding: 36px 0;
                align-items: flex-start;
            }

            .display-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    {% include 'partials/meta_pixel.html' %}

    <script>
        if (typeof fbq === 'function') {
            fbq('track', 'Lead', {
                content_name: 'Confirmed XeanVI PRO Waitlist Signup',
                content_category: 'Waitlist'
            });
        }
    </script>

    <main class="page-wrap">
        <div class="container">
            <div class="row justify-content-center">
                <section class="col-lg-8 col-xl-7">
                    <div class="glass-card p-4 p-md-5 text-center">
                        <h1 class="display-title mb-4">You’re on the XeanVI PRO waitlist.</h1>

                        <p class="lead text-muted mb-4">
                            Watch your inbox for early access updates. First 25 waitlist members receive 3 months of XeanVI PRO free at launch.
                        </p>

                        <a href="{{ url_for('playbook') }}" class="btn btn-custom rounded w-100 w-md-auto mb-3">
                            See How the Playbook Works
                        </a>

                        <div>
                            <a href="{{ url_for('index') }}" class="secondary-link">Back to XeanVI</a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
