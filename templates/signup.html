<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account - Veteran Pro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .auth-wrap { max-width: 400px; margin: 100px auto; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--line);
      background: var(--panel-2); color: var(--text); font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn-block { width: 100%; display: block; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap auth-wrap">
    <section class="card">
      <div class="section-head" style="justify-content: center; margin-bottom: 24px;">
        <h2>Create Your Account</h2>
      </div>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="status" style="border-color: #ef4444; color: #fecaca; background: rgba(127,29,29,0.2); margin-bottom: 20px;">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="/signup" method="POST">
        <div class="form-group">
          <label for="full_name">Full Legal Name</label>
          <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="trader@example.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" placeholder="(555) 555-5555">
        </div>

        <div class="form-group">
          <label for="address">Street Address</label>
          <input type="text" id="address" name="address" placeholder="123 Trading Way">
        </div>

        <div style="display: flex; gap: 10px;">
          <div class="form-group" style="flex: 2;">
            <label for="city">City</label>
            <input type="text" id="city" name="city">
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="state">State</label>
            <input type="text" id="state" name="state" placeholder="FL">
          </div>
          <div class="form-group" style="flex: 1;">
            <label for="zip_code">Zip</label>
            <input type="text" id="zip_code" name="zip_code">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Create Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px; margin-top: 15px;">
          <input type="checkbox" id="tos" name="tos" required style="width: auto; margin-top: 5px;">
          <label for="tos" style="text-transform: none; color: var(--muted); font-size: 0.8rem;">
            I understand this is an <strong>automated execution tool</strong> based on technical parameters. I acknowledge that I am responsible for my own trading risk and that Veteran Pro is not a financial advisor.
          </label>
        </div>
        <button type="submit" class="btn-block" style="margin-top: 10px;">Create My Account</button>
      </form>
      
      <div style="text-align: center; margin-top: 20px;">
        <span class="muted">Already have an account?</span> 
        <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: bold;">Log In Here</a>
      </div>
    </section>
  </div>
</body>
</html>
