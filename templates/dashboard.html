<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | XeanVI</title>
    <style>
        :root {
            --bg-primary: #060b14;
            --bg-secondary: #101826;
            --bg-panel: #1e293b;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #eef4ff;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.15);
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        /* Navigation */
        .dash-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.05em; }
        .logo span { color: var(--accent-blue); }

        .top-metrics { display: flex; gap: 2rem; }
        .metric-mini { text-align: right; }
        .metric-mini span { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-mini strong { font-size: 1.1rem; color: var(--text-main); }

        /* Main Workspace */
        .workspace { display: grid; grid-template-columns: 350px 1fr; flex-grow: 1; overflow: hidden; }

        /* Left Panel: Engine Controls */
        .control-panel { background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; overflow-y: auto; }
        
        .panel-header { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        .strategy-select { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-main); padding: 1rem; border-radius: 8px; width: 100%; margin-bottom: 1.5rem; font-size: 1rem; cursor: pointer; outline: none; }
        
        .btn-scan { background: var(--accent-blue); color: white; border: none; padding: 1.25rem; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 4px 15px var(--accent-glow); margin-bottom: 2rem; }
        .btn-scan:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-scan:active { transform: translateY(0); }

        /* Terminal Window */
        .terminal-container { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .terminal-header { background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .terminal-output { padding: 1rem; font-family: var(--font-mono); font-size: 0.85rem; color: var(--success); overflow-y: auto; flex-grow: 1; line-height: 1.5; }
        .log-time { color: var(--text-muted); margin-right: 10px; }
        .log-alert { color: var(--accent-blue); font-weight: bold; }

        /* Right Panel: Live Charting */
        .chart-panel { padding: 1.5rem; display: flex; flex-direction: column; background: var(--bg-primary); }
        .chart-container { flex-grow: 1; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; }
        
    </style>
</head>
<body>

    <div class="dash-nav">
        <a href="/" class="logo">Xean<span>VI</span></a>
        
        <div class="top-metrics">
            <div class="metric-mini">
                <span>Mode</span>
                <strong style="color: var(--success);">Sandbox Active</strong>
            </div>
            <div class="metric-mini">
                <span>Available Capital</span>
                <strong>$10,000.00</strong>
            </div>
            <div class="metric-mini">
                <span>Today's PnL</span>
                <strong style="color: var(--success);">+$0.00</strong>
            </div>
        </div>
    </div>

    <div class="workspace">
        
        <div class="control-panel">
            
            <div class="panel-header">1. Select Strategy</div>
            <select class="strategy-select" id="strategy-selector">
                <option value="momentum">Momentum Vault (Recommended)</option>
                <option value="defensive">Defensive Scalper Vault</option>
                <option value="crypto">24/7 Digital Asset Engine</option>
            </select>

            <div class="panel-header">2. Execute</div>
            <button class="btn-scan" id="run-scan-btn" onclick="startScanner()">Run Morning Scan</button>

            <div class="panel-header">Engine Output Log</div>
            <div class="terminal-container">
                <div class="terminal-header">
                    <span>Xean-Core Terminal</span>
                    <span>Status: IDLE</span>
                </div>
                <div class="terminal-output" id="terminal-log">
                    <div><span class="log-time">[08:00:00]</span> System initialized. Awaiting manual scan execution.</div>
                </div>
            </div>
        </div>

        <div class="chart-panel">
            <div class="panel-header" style="margin-bottom: 1rem;">Live Target Acquisition: <span id="target-ticker" style="color: var(--accent-blue); font-weight: bold; font-size: 1.2rem;">AWAITING SCAN</span></div>
            
            <div class="chart-container" id="chart-widget-container">
                <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                    <div id="tradingview_chart" style="height: 100%; width: 100%;"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                    function loadChart(ticker) {
                        new TradingView.widget({
                            "autosize": true,
                            "symbol": ticker,
                            "interval": "1",
                            "timezone": "Etc/UTC",
                            "theme": "dark",
                            "style": "1",
                            "locale": "en",
                            "enable_publishing": false,
                            "backgroundColor": "#101826",
                            "gridColor": "rgba(148, 163, 184, 0.1)",
                            "hide_top_toolbar": false,
                            "hide_legend": false,
                            "save_image": false,
                            "container_id": "tradingview_chart"
                        });
                    }
                    // Load a default blank/SPY chart on startup
                    loadChart("SPY");
                    </script>
                </div>
            </div>
        </div>

    </div>

    <script>
        function startScanner() {
            const btn = document.getElementById('run-scan-btn');
            const terminal = document.getElementById('terminal-log');
            const tickerHeader = document.getElementById('target-ticker');
            
            btn.innerText = "SCANNING MARKET...";
            btn.style.background = "#f59e0b"; // Warning orange
            btn.style.boxShadow = "0 4px 15px rgba(245, 158, 11, 0.5)";
            btn.disabled = true;

            terminal.innerHTML += `<div><span class="log-time">[${new Date().toLocaleTimeString()}]</span> <span class="log-alert">INITIATING XEAN-CORE SCAN...</span></div>`;
            terminal.scrollTop = terminal.scrollHeight;

            // Simulated Scan Sequence (To show the user the "Magic")
            setTimeout(() => addLog("Fetching pre-market volume leaders...", "var(--text-muted)"), 1000);
            setTimeout(() => addLog("Analyzing 4,203 tickers against Macro-Breadth...", "var(--text-muted)"), 2500);
            setTimeout(() => addLog("Rejecting TSLA: $TICK divergence detected.", "var(--danger)"), 4000);
            setTimeout(() => addLog("Rejecting AAPL: Sentiment score below threshold.", "var(--danger)"), 5000);
            setTimeout(() => addLog("Target Identified: NVDA. Volume +214%, Sentiment Bullish.", "var(--accent-blue)"), 7000);
            
            setTimeout(() => {
                addLog("Executing DRA Sizing... Locked. Sending order to Alpaca.", "var(--success)");
                btn.innerText = "RUN MORNING SCAN";
                btn.style.background = "var(--accent-blue)";
                btn.style.boxShadow = "0 4px 15px var(--accent-glow)";
                btn.disabled = false;
                
                // Update the Header and load the new TradingView Chart
                tickerHeader.innerText = "NVDA (Long)";
                loadChart("NASDAQ:NVDA");
            }, 8500);
        }

        function addLog(message, color) {
            const terminal = document.getElementById('terminal-log');
            terminal.innerHTML += `<div><span class="log-time">[${new Date().toLocaleTimeString()}]</span> <span style="color: ${color};">${message}</span></div>`;
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
