name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: pip check
      - run: python -m py_compile app.py config.py broker.py execution_guard.py scanner_service.py config_check.py models.py tasks.py
      - run: pytest -q
